<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summit Villas — Where Sky Meets Forest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--gold:#c9a96e;--gold-light:#e8d5a8;--dark:#0a0a0a;--charcoal:#1a1a1a;
--smoke:#2a2a2a;--mist:rgba(255,255,255,.06);--text:#d4d0c8;--text-dim:#8a8578;
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--dark);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;overflow-x:hidden}
::selection{background:var(--gold);color:var(--dark)}

/* HERO */
.hero{position:relative;height:100vh;overflow:hidden}
.hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(.7);animation:slowZoom 20s ease-in-out infinite alternate}
@keyframes slowZoom{from{transform:scale(1)}to{transform:scale(1.08)}}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,rgba(0,0,0,.5) 60%,var(--dark) 100%)}
.hero-content{position:absolute;bottom:12%;left:0;right:0;text-align:center;padding:0 2rem}
.hero-tag{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(.85rem,1.5vw,1.1rem);letter-spacing:.45em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s ease .3s forwards}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:400;line-height:1.05;color:#fff;margin-bottom:1.2rem;opacity:0;animation:fadeUp .8s ease .5s forwards}
.hero-title em{font-style:italic;color:var(--gold)}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2vw,1.4rem);font-weight:300;color:var(--text-dim);max-width:600px;margin:0 auto;opacity:0;animation:fadeUp .8s ease .7s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fadeUp .8s ease 1.2s forwards}
.scroll-hint span{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim)}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--gold),transparent);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);background:rgba(10,10,10,.4);transition:background .3s}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:#fff;letter-spacing:.1em}
.logo span{color:var(--gold)}
.nav-links{display:flex;gap:2.5rem}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;transition:color .3s}
.nav-links a:hover{color:var(--gold)}

/* SECTIONS */
section{padding:clamp(4rem,10vw,8rem) clamp(1.5rem,5vw,4rem)}
.section-tag{font-family:'Cormorant Garamond',serif;font-size:.8rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);color:#fff;margin-bottom:2rem;line-height:1.2}

/* VISION */
.vision{max-width:900px;margin:0 auto;text-align:center}
.vision p{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2.2vw,1.5rem);line-height:1.8;color:var(--text-dim);margin-bottom:1.5rem}
.divider{width:60px;height:1px;background:var(--gold);margin:3rem auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2rem;max-width:1000px;margin:0 auto;padding:3rem 0}
.stat{text-align:center;padding:2rem;border:1px solid var(--mist);background:rgba(255,255,255,.02);transition:border-color .3s}
.stat:hover{border-color:var(--gold)}
.stat-num{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);color:var(--gold)}
.stat-label{font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-dim);margin-top:.5rem}

/* FEATURES */
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;max-width:1100px;margin:2rem auto 0}
.feature{padding:2.5rem;background:var(--charcoal);border-left:2px solid var(--gold);transition:transform .3s,background .3s}
.feature:hover{transform:translateX(6px);background:var(--smoke)}
.feature h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:#fff;margin-bottom:.8rem}
.feature p{font-size:.9rem;line-height:1.7;color:var(--text-dim)}

/* INVESTMENT */
.invest{background:var(--charcoal)}
.invest-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:2rem;max-width:1100px;margin:2rem auto 0}
.invest-card{padding:2.5rem;border:1px solid rgba(201,169,110,.15);text-align:center;position:relative;overflow:hidden}
.invest-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.invest-card h3{font-family:'Cormorant Garamond',serif;font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.invest-card .price{font-family:'Playfair Display',serif;font-size:2.2rem;color:#fff;margin-bottom:.5rem}
.invest-card .detail{font-size:.85rem;color:var(--text-dim);line-height:1.7}

/* CTA */
.cta-section{text-align:center;max-width:700px;margin:0 auto}
.cta-section p{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--text-dim);margin-bottom:2.5rem;line-height:1.7}
.cta-btn{display:inline-block;padding:1rem 3rem;font-family:'Lato',sans-serif;font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dark);background:var(--gold);text-decoration:none;transition:all .3s;border:none;cursor:pointer}
.cta-btn:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,169,110,.2)}
.cta-btn-outline{display:inline-block;padding:1rem 3rem;font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);text-decoration:none;transition:all .3s;margin-left:1rem}
.cta-btn-outline:hover{background:var(--gold);color:var(--dark)}

/* FOOTER */
footer{text-align:center;padding:3rem;border-top:1px solid var(--mist)}
footer p{font-size:.7rem;letter-spacing:.2em;color:var(--text-dim)}

/* MOBILE */
@media(max-width:768px){
nav{padding:1rem 1.5rem}
.nav-links{display:none}
.invest-card .price{font-size:1.6rem}
.cta-btn-outline{margin-left:0;margin-top:1rem;display:block}
}
</style>
</head>

<nav>
<div class="logo">SUMMIT<span>.</span></div>
<div class="nav-links">
<a href="#vision">Vision</a>
<a href="#features">Residences</a>
<a href="#invest">Investment</a>
<a href="#contact">Connect</a>
</div>
</nav>
